# English translations for the restaurant booking bot.
# This is the default locale (see `restaurant_booking/i18n`).

[help]
text = "🍽️ Restaurant Booking Bot\n\nAvailable commands:\n/start - Register or update your profile\n/menu - Browse our menu and order food\n/book - Make a new table reservation\n/my_bookings - View your reservations\n/language - Change language\n/help - Show this message"

[settings]
choose_language = "🌍 Choose your language:"
language_set = "✅ Language set to English"

[common]
yes = "✅ Yes"
no = "❌ No"
try_again = "Please try again."
