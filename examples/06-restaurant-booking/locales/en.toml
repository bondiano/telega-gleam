[book]
welcome = "🍽️ Let's make your reservation at {restaurant}!\n\nI'll help you book the perfect table."
ask_date = "📅 Enter date (YYYY-MM-DD):\nExample: 2024-12-25"
ask_time = "🕐 Enter time (HH:MM):\nExample: 19:30\n\nHours: Mon-Thu 17:00-23:00, Fri-Sat 17:00-24:00, Sun 17:00-22:00"
ask_guests = "👥 How many guests? (1-12)"
confirm = "🎉 Confirm your reservation:\n\n📅 Date: {date}\n🕐 Time: {time}\n👥 Guests: {guests}\n🍽️ Restaurant: {restaurant}\n\nWe'll book an available table for you!"
success = "✅ Booking confirmed!\n\nConfirmation: {code}\n📅 {date} at {time}\n👥 {guests} guests\n\nThank you for choosing {restaurant}!"
error = "❌ Booking error: {error}\nUse /book to try again."
