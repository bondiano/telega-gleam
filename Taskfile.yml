version: "3"

vars:
  # Every ecosystem package in the monorepo (single source of truth).
  PACKAGES: >-
    telega_wisp telega_mist telega_httpc telega_hackney
    telega_webapp telega_i18n
    telega_storage_postgres telega_storage_sqlite telega_storage_redis
  # Standalone example projects under examples/.
  EXAMPLES: >-
    00-echo-bot 01-commands-bot 02-session-bot 03-conversation-bot
    04-keyboard-bot 05-media-group-bot 06-restaurant-booking

tasks:
  format:
    desc: Format root project
    cmd: gleam format

  format:all:
    desc: Format root project, all ecosystem packages, and all examples
    cmds:
      - gleam format
      - for: { var: PACKAGES }
        cmd: cd {{.ITEM}} && gleam format
      - for: { var: EXAMPLES }
        cmd: cd examples/{{.ITEM}} && gleam format

  codegen:fetch:
    desc: Download the latest Telegram Bot API spec (PaulSonOfLars/telegram-bot-api-spec)
    cmd: curl -fsSL https://raw.githubusercontent.com/PaulSonOfLars/telegram-bot-api-spec/main/api.json -o codegen/api.json

  codegen:
    desc: Regenerate the model layer (types/decoder/encoder) from codegen/api.json
    cmds:
      - cd codegen && gleam run
      - gleam format src
      - gleam check

  codegen:diff:
    desc: Show what the last codegen run changed in the model layer
    cmd: git --no-pager diff --stat -- src/telega/model

  test:
    desc: Run tests in root project
    cmd: gleam test

  test:all:
    desc: Run tests in root project, all ecosystem packages, and all examples
    cmds:
      - gleam test
      - for: { var: PACKAGES }
        cmd: cd {{.ITEM}} && gleam test
      - for: { var: EXAMPLES }
        cmd: cd examples/{{.ITEM}} && gleam test

  publish:
    desc: >
      Publish the core telega package, then every ecosystem package, to Hex.
      Bump the `version` of each package you changed first — Hex rejects
      republishing an existing version, so unchanged packages are simply
      reported as skipped at the end.
    cmds:
      - task: publish:core
      - task: publish:packages

  publish:core:
    desc: Publish the core telega package to Hex
    cmd: gleam publish

  publish:packages:
    desc: >
      Publish every ecosystem package to Hex. Packages that use a local path
      dependency on telega (`telega = { path = ".." }`) have it temporarily
      rewritten to a version requirement (derived from the core version) for the
      publish, then restored from git so local dev/CI keep using the path dep.
      Requires the core to already be published on Hex.
    cmd: |
      set -u
      CORE=$(sed -nE 's/^version = "([^"]+)"/\1/p' gleam.toml)
      MAJOR=${CORE%%.*}
      REQ=">= ${CORE} and < $((MAJOR + 1)).0.0"
      echo "telega requirement for path-dependent packages: ${REQ}"
      failed=""
      for pkg in {{.PACKAGES}}; do
        echo ""
        echo "==> Publishing ${pkg}"
        swapped=0
        if grep -q '^telega = { path = "\.\." }' "${pkg}/gleam.toml"; then
          sed -i.bak "s#^telega = { path = \"\.\.\" }#telega = \"${REQ}\"#" "${pkg}/gleam.toml"
          rm -f "${pkg}/gleam.toml.bak"
          swapped=1
        fi
        ( cd "${pkg}" && gleam publish ) || failed="${failed} ${pkg}"
        if [ "${swapped}" -eq 1 ]; then
          git -C "${pkg}" checkout -- gleam.toml manifest.toml
        fi
      done
      if [ -n "${failed}" ]; then
        echo ""
        echo "Not published (already on Hex or errored):${failed}"
        exit 1
      fi
      echo ""
      echo "All packages published."
