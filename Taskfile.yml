version: "3"

tasks:
  format:
    desc: Format root project
    cmd: gleam format

  format:all:
    desc: Format root project, adapters, and all examples
    cmds:
      - gleam format
      - for: ["telega_wisp", "telega_httpc", "telega_hackney", "telega_webapp", "telega_i18n"]
        cmd: cd {{.ITEM}} && gleam format
      - for: [
          "00-echo-bot",
          "01-commands-bot",
          "02-session-bot",
          "03-conversation-bot",
          "04-keyboard-bot",
          "05-media-group-bot",
          "06-restaurant-booking",
        ]
        cmd: cd examples/{{.ITEM}} && gleam format

  codegen:fetch:
    desc: Download the latest Telegram Bot API spec (PaulSonOfLars/telegram-bot-api-spec)
    cmd: curl -fsSL https://raw.githubusercontent.com/PaulSonOfLars/telegram-bot-api-spec/main/api.json -o codegen/api.json

  codegen:
    desc: Regenerate the model layer (types/decoder/encoder) from codegen/api.json
    cmds:
      - cd codegen && gleam run
      - gleam format src
      - gleam check

  codegen:diff:
    desc: Show what the last codegen run changed in the model layer
    cmd: git --no-pager diff --stat -- src/telega/model

  test:
    desc: Run tests in root project
    cmd: gleam test

  test:all:
    desc: Run tests in root project, adapters, and check all examples compile
    cmds:
      - gleam test
      - for: ["telega_wisp", "telega_httpc", "telega_hackney", "telega_webapp", "telega_i18n"]
        cmd: cd {{.ITEM}} && gleam test
      - for: [
          "00-echo-bot",
          "01-commands-bot",
          "02-session-bot",
          "03-conversation-bot",
          "04-keyboard-bot",
          "05-media-group-bot",
          "06-restaurant-booking",
        ]
        cmd: cd examples/{{.ITEM}} && gleam test
