name = "telega_mist"
version = "1.0.0"
description = "Mist adapter for Telega Telegram Bot Library"
licences = ["Apache-2.0"]
repository = { type = "github", user = "bondiano", repo = "telega-gleam" }

gleam = ">= 1.15.1"
target = "erlang"

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
gleam_http = ">= 4.0.0 and < 5.0.0"
gleam_json = ">= 3.0.0 and < 4.0.0"
gleam_erlang = ">= 1.2.0 and < 2.0.0"
logging = ">= 1.3.0 and < 2.0.0"
mist = ">= 6.0.0 and < 7.0.0"
telega = ">= 1.0.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.2.0 and < 2.0.0"
