name = "codegen"
version = "1.0.0"

description = "Generate Telega's model layer (types/decoder/encoder) from the official Telegram Bot API spec."
licences = ["Apache-2.0"]

target = "erlang"
gleam = ">= 1.12.0"

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
gleam_json = ">= 3.0.2 and < 4.0.0"
gleam_regexp = ">= 1.1.1 and < 2.0.0"
simplifile = ">= 2.3.0 and < 3.0.0"
justin = ">= 1.0.1 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.2.0 and < 2.0.0"
